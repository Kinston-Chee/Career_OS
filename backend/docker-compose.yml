services:
  db:
    image: postgres:16-alpine
    platform: linux/amd64   # add this line
    environment:
      POSTGRES_USER: careeros_admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
    volumes:
      - careeros_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros_admin -d careerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - .env
      - agents/careeros_agent/.env
    environment:
      # Overrides the DATABASE_URL host in .env (which points at "localhost")
      # so the app reaches the "db" service instead of the container's own loopback.
      DATABASE_URL: postgresql+psycopg://careeros_admin:admin123@db/careerdb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.app:app --host 0.0.0.0 --port 8000"

volumes:
  careeros_pgdata:
